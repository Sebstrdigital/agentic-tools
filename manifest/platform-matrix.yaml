schema_version: 1
source_id: seb-claude-tools
future_source_id: seb-agentic-tools
source_id_aliases:
  - seb-claude-tools

platforms:
  claude-code:
    status: supported
    adapter: platforms/claude-code
    install_targets:
      agents: ~/.claude/agents
      docs: ~/.claude/docs
      skills: ~/.claude/skills
  codex:
    status: planned
    adapter: platforms/codex
  opencode:
    status: planned
    adapter: platforms/opencode
  pi-mono:
    status: planned
    adapter: platforms/pi-mono

artifact_types:
  agents:
    source: agents/*.md
    claude-code: agents
    codex: planned
    opencode: planned
    pi-mono: planned
  docs:
    source:
      - docs/*.md
      - docs/*/*.md
    claude-code: docs
    codex: planned
    opencode: planned
    pi-mono: planned
  skills:
    source: skills/*/*/*.md
    claude-code: skills
    codex: planned
    opencode: planned
    pi-mono: planned

retired_artifacts:
  agents:
    - test-agent.md
    - nordic-ux-critic.md
    - seb-the-boss.md
  commands:
    - agent-audit.md
    - agent-review.md
    - brand-voice.md
    - client-proposal.md
    - code-review.md
    - component.md
    - data-integrity-audit.md
    - debug.md
    - deep-review.md
    - harness-architect.md
    - harness-build.md
    - harness-interview.md
    - harness-review.md
    - harness-spec.md
    - infra-audit.md
    - page.md
    - patterns.md
    - prd.md
    - product-context.md
    - project-audit.md
    - refine.md
    - security-audit.md
    - skill-review.md
    - ui.md
    - ux-audit.md
    - ux-copy.md
